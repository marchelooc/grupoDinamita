name: Test Club Infinity Chess

on:
  pull_request:
    branches: [development]   
  push:
    branches: [development]   
  workflow_dispatch:          

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalando Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt

      - name: Instalando requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-html pytest-xdist  # <--- aquí añadimos pytest-xdist

      - name: Ejecutar agregar_grupo
        run: PYTHONPATH=. pytest tests/api_infinitychess/MA_agregar_grupo -n 1
    
      - name: Ejecutar tests batch 2
        run: PYTHONPATH=. pytest tests/api_infinitychess/batch2 -n 1

      - name: Descargar HTML Report
        if: always()                 
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ github.run_id }}
          path: report.html
          if-no-files-found: warn
